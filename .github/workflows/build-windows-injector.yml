name: build-windows-injector

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: cmake -S native-host -B native-host/build -A x64

      - name: Build (Release)
        run: cmake --build native-host/build --config Release

      - name: Prepare artifact
        shell: pwsh
        run: |
          $exe = Join-Path $env:GITHUB_WORKSPACE 'native-host\build\Release\schreibdienst-injector.exe'
          if (-not (Test-Path -LiteralPath $exe)) {
            throw "schreibdienst-injector.exe wurde nicht gebaut: $exe"
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -LiteralPath $exe -Destination (Join-Path $env:GITHUB_WORKSPACE 'dist\schreibdienst-injector.exe') -Force
          Copy-Item -Path (Join-Path $env:GITHUB_WORKSPACE 'docs\DEPLOY_INJECTOR_KUNDE.md') -Destination (Join-Path $env:GITHUB_WORKSPACE 'dist\README.txt') -Force
          Compress-Archive -Path (Join-Path $env:GITHUB_WORKSPACE 'dist\*') -DestinationPath (Join-Path $env:GITHUB_WORKSPACE 'schreibdienst-injector-windows.zip')

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: schreibdienst-injector-windows
          path: |
            dist/schreibdienst-injector.exe
            schreibdienst-injector-windows.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            schreibdienst-injector-windows.zip
            dist/schreibdienst-injector.exe
          generate_release_notes: true
